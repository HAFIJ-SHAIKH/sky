<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opensky Agent</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-content">
      <div class="logo-mark">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="loader-title">Opensky</h1>
      <p class="loader-status" id="loadingLabel">Initializing Systems...</p>
      
      <div class="progress-container">
        <div class="progress-bar" id="sliderFill"></div>
      </div>
      <div class="progress-stats">
        <span id="loadingPercent">0%</span>
      </div>
      
      <!-- Model Cards Container -->
      <div id="modelStatusContainer" class="model-status-container"></div>
    </div>
  </div>

  <!-- Main Application -->
  <div class="app-container" id="chatContainer">
    
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <span class="app-title">Opensky</span>
        <span class="app-subtitle">Autonomous Agent</span>
      </div>
      <div class="header-right">
        <div class="status-indicator" id="statusIndicator">
          <span class="status-dot"></span>
          <span class="status-text" id="statusText">Ready</span>
        </div>
      </div>
    </header>

    <!-- Chat Area -->
    <main class="chat-area" id="messagesArea">
      <!-- Welcome Message -->
      <div class="welcome-message">
        <h2>Hello, I am Opensky.</h2>
        <p>I use a Thought-Action-Observation loop to assist you. Ask me anything.</p>
      </div>
    </main>

    <!-- Input Area -->
    <footer class="input-area">
      <div class="input-wrapper">
        <textarea 
          id="inputText" 
          class="input-field" 
          placeholder="Ask Opensky..." 
          rows="1"
        ></textarea>
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <!-- Script -->
  <script type="module" src="script.js"></script>
</body>
</html>
