<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Opensky</title>
  
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-content">
      <div class="logo-container">
        <!-- Minimalist Energy Vertex Spiral Logo -->
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 12c-2-2.67-4-4-6-4s-3.5 2-3.5 4 1.5 4 3.5 4 4-1.33 6-4c2 2.67 4 4 6 4s3.5-2 3.5-4-1.5-4-3.5-4-4 1.33-6 4z" id="spiralPath">
            <animate attributeName="d" dur="3s" repeatCount="indefinite" 
              values="M12 12c-2-2.67-4-4-6-4s-3.5 2-3.5 4 1.5 4 3.5 4 4-1.33 6-4c2 2.67 4 4 6 4s3.5-2 3.5-4-1.5-4-3.5-4-4 1.33-6 4z;
                      M12 12c2-2.67 4-4 6-4s3.5 2 3.5 4-1.5 4-3.5 4-4-1.33-6-4c-2 2.67-4 4-6 4s-3.5-2-3.5-4 1.5-4 3.5-4 4 1.33 6 4z;
                      M12 12c-2-2.67-4-4-6-4s-3.5 2-3.5 4 1.5 4 3.5 4 4-1.33 6-4c2 2.67 4 4 6 4s3.5-2 3.5-4-1.5-4-3.5-4-4 1.33-6 4z" />
          </path>
        </svg>
      </div>
      <h1 class="loader-title">Opensky</h1>
      <p class="loader-status" id="loadingLabel">Initializing System...</p>
      <div class="progress-container">
        <div class="progress-bar" id="sliderFill"></div>
      </div>
      <div class="progress-stats"><span id="loadingPercent">0%</span></div>
      <div id="modelStatusContainer" class="model-status-container"></div>
      <div id="debugLog" style="display:none;"></div>
    </div>
  </div>

  <!-- App Container -->
  <div class="app-container" id="chatContainer">
    
    <header class="app-header">
      <div class="app-logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 12c-2-2.67-4-4-6-4s-3.5 2-3.5 4 1.5 4 3.5 4 4-1.33 6-4c2 2.67 4 4 6 4s3.5-2 3.5-4-1.5-4-3.5-4-4 1.33-6 4z"></path>
        </svg>
        <span>Opensky</span>
      </div>
    </header>

    <main class="chat-area" id="messagesArea"></main>

    <footer class="input-area">
      <div id="imagePreviewContainer" class="image-preview-container">
        <img id="imagePreview" src="" alt="Preview">
        <button id="removeImageBtn" class="remove-img-btn">&times;</button>
      </div>
      
      <div class="input-wrapper">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button id="uploadBtn" class="upload-btn" title="Upload Image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </button>
        
        <textarea id="inputText" class="input-field" placeholder="Ask anything..." rows="1"></textarea>
        
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
