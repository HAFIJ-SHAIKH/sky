<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>Opensky</title>
  
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div class="loader-content">
      
      <!-- Static Energy Vertex Logo -->
      <div class="logo-container">
        <svg width="80" height="80" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <rect width="400" height="400" fill="white" />
          <g transform="translate(200, 200) rotate(-15)">
            <ellipse cx="0" cy="-60" rx="12" ry="18" fill="black" />
            <g fill="none" stroke="black">
              <path d="M-20,40 C-80,120 120,120 80,-40 C60,-120 -60,-120 -80,-40 C-100,60 40,160 140,40" stroke-width="2.5" opacity="0.9" />
              <path d="M-15,35 C-75,110 110,110 75,-35 C55,-110 -55,-110 -75,-35 C-95,55 35,150 130,35" stroke-width="1.8" opacity="0.8" />
              <path d="M-10,-55 C-30,-90 30,-90 10,-55 C-10,-20 30,-20 10,15" stroke-width="3" />
              <path d="M-5,-50 C-20,-75 20,-75 5,-50 C-5,-25 20,-25 5,10" stroke-width="1.5" />
              <g stroke-width="0.4" opacity="0.6">
                <circle cx="0" cy="0" r="110" stroke-dasharray="0.5 3" />
                <ellipse cx="10" cy="5" rx="140" ry="100" transform="rotate(20)" />
                <ellipse cx="-5" cy="-10" rx="130" ry="115" transform="rotate(-10)" />
              </g>
            </g>
            <g fill="black">
              <circle cx="120" cy="-40" r="1.5" /><circle cx="-130" cy="20" r="1.2" />
              <circle cx="50" cy="145" r="1" /><circle cx="-60" cy="-140" r="0.8" />
              <circle cx="100" cy="80" r="2" /><circle cx="10" cy="-70" r="0.5" />
              <circle cx="15" cy="-65" r="0.4" /><circle cx="8" cy="-75" r="0.6" />
            </g>
          </g>
        </svg>
      </div>

      <h1 class="loader-title">Opensky</h1>
      <p class="loader-status" id="loadingLabel">Connecting to Network...</p>
      
      <div class="progress-container">
        <div class="progress-bar" id="sliderFill"></div>
      </div>
      <div class="progress-stats"><span id="loadingPercent">0%</span></div>
      
      <div id="modelStatusContainer" class="model-status-container"></div>
      <div id="debugLog"></div>
    </div>
  </div>

  <div class="app-container" id="chatContainer">
    <header class="app-header">
      <div class="app-logo">
        <svg width="24" height="24" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
           <g transform="translate(200, 200) scale(0.06) rotate(-15)">
             <ellipse cx="0" cy="-60" rx="12" ry="18" fill="black" />
             <path d="M-20,40 C-80,120 120,120 80,-40 C60,-120 -60,-120 -80,-40 C-100,60 40,160 140,40" fill="none" stroke="black" stroke-width="20" />
           </g>
        </svg>
        <span>Opensky</span>
      </div>
    </header>

    <main class="chat-area" id="messagesArea"></main>

    <footer class="input-area">
      <div id="imagePreviewContainer" class="image-preview-container">
        <img id="imagePreview" src="" alt="Preview">
        <button id="removeImageBtn" class="remove-img-btn">&times;</button>
      </div>
      
      <div class="input-wrapper">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button id="uploadBtn" class="upload-btn" title="Upload Image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </button>
        
        <textarea id="inputText" class="input-field" placeholder="Ask anything..." rows="1"></textarea>
        
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
