<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sky AI - WebGPU</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-pattern"></div>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-title">Sky</div>
    <div class="loading-bar-container">
      <div class="loading-label" id="loadingLabel">Initializing WebGPU...</div>
      <div class="slider-track">
        <div class="slider-fill" id="sliderFill"></div>
      </div>
      <div class="loading-percent" id="loadingPercent">0%</div>
      
      <!-- Fallback Button Container (Hidden by default) -->
      <div id="errorContainer" style="display: none; margin-top: 1.5rem; text-align: center;">
        <p style="font-size: 0.75rem; color: #ef4444; margin-bottom: 0.75rem;" id="errorMsg">Model load failed.</p>
        <button id="fallbackBtn" class="fallback-btn">
          Load Default Model (Qwen)
        </button>
      </div>
    </div>
  </div>

  <!-- Chat Interface -->
  <div class="chat-container" id="chatContainer">
    <header class="chat-header">
      <span class="brand-name">Sky</span>
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">Initializing...</span>
      </div>
    </header>

    <div class="messages-area" id="messagesArea">
      <div class="welcome">
        <div class="welcome-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <h1 class="welcome-title">Hello, I'm Sky</h1>
        <p class="welcome-subtitle">Running locally in your browser using WebGPU.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="useSuggestion('Write a Python function')">Python code</button>
          <button class="suggestion-btn" onclick="useSuggestion('Solve: 2x + 5 = 15')">Math</button>
          <button class="suggestion-btn" onclick="useSuggestion('Write a haiku about AI')">Creative</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <div class="input-box">
          <textarea 
            class="input-text" 
            id="inputText" 
            placeholder="Ask Sky anything..."
            rows="1"
          ></textarea>
        </div>
        <button class="send-button" id="sendBtn" disabled aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
