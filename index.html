<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#4f46e5">
  <title>Opensky</title>
  
  <!-- Link to your existing CSS -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- Chart.js for Graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- REQUIRED: Import Map for LangGraph.js -->
  <script type="importmap">
    {
      "imports": {
        "@mlc-ai/web-llm": "https://esm.run/@mlc-ai/web-llm",
        "@langchain/langgraph": "https://esm.run/@langchain/langgraph",
        "@langchain/core": "https://esm.run/@langchain/core"
      }
    }
  </script>
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loader-content">
      <div class="logo-mark">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <h1 class="loader-title">Opensky</h1>
      <p class="loader-status" id="loadingLabel">Initializing Smart Core...</p>
      <div class="progress-container">
        <div class="progress-bar" id="sliderFill"></div>
      </div>
      <div class="progress-stats"><span id="loadingPercent">0%</span></div>
      <div id="modelStatusContainer" class="model-status-container"></div>
      <div id="debugLog" style="display:none;"></div>
    </div>
  </div>

  <!-- Main App Container -->
  <div class="app-container" id="chatContainer">
    <main class="chat-area" id="messagesArea"></main>

    <footer class="input-area">
      <div id="imagePreviewContainer" class="image-preview-container">
        <img id="imagePreview" src="" alt="Preview">
        <button id="removeImageBtn" class="remove-img-btn">&times;</button>
      </div>
      
      <div class="input-wrapper">
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button id="uploadBtn" class="upload-btn" title="Upload Image">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </button>
        
        <textarea id="inputText" class="input-field" placeholder="Ask anything..." rows="1"></textarea>
        
        <button id="sendBtn" class="send-btn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <!-- Tesseract.js for OCR -->
  <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
  
  <!-- Link to your existing Javascript file -->
  <script type="module" src="script.js"></script>
</body>
</html>
